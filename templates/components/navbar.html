<header class="festival-navbar sticky top-0 z-30 w-full bg-white/80 backdrop-blur-xl border-b border-slate-200/60 transition-all duration-300 supports-[backdrop-filter]:bg-white/60">
    <div class="flex flex-wrap items-center justify-between gap-3 px-4 py-3 sm:px-6">
        
        <div class="flex min-w-0 items-center gap-3 sm:gap-4 flex-1">
            <button @click="sidebarOpen = true" class="lg:hidden p-2 text-slate-500 hover:bg-indigo-50 hover:text-indigo-600 rounded-xl transition-all duration-200 active:scale-95">
                <span class="material-symbols-rounded text-2xl">menu</span>
            </button>

            <button @click="collapseSidebar()" class="hidden lg:block p-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50/50 rounded-xl transition-all duration-300 active:scale-90 group">
                <span class="material-symbols-rounded text-2xl transform group-hover:rotate-180 transition-transform duration-500">menu_open</span>
            </button>

            <div class="hidden md:flex items-center w-full max-w-md min-w-0 group">
                <div class="relative w-full transition-all duration-300 ease-out group-focus-within:scale-[1.02]">
                    <span class="material-symbols-rounded absolute left-3 top-2.5 text-slate-400 text-xl transition-colors group-focus-within:text-indigo-500">search</span>
                    <input type="text" placeholder="Search..." class="w-full bg-slate-100/50 border border-slate-200 rounded-full py-2.5 pl-10 pr-12 text-sm text-slate-700 outline-none focus:bg-white focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all">
                </div>
            </div>
        </div>

        <div class="ml-auto flex shrink-0 items-center gap-2 sm:gap-4">
            
            {% if user_type == "Admin" %}
            <button class="hidden sm:flex items-center gap-2 px-3 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-full shadow-lg transition-all">
                <span class="material-symbols-rounded text-lg">add</span>
                <span class="pr-1">New Task</span>
            </button>
            {% endif %}

            <a href="{% url 'main:notification' %}" class="relative p-2.5 text-slate-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-full transition-all group">
                <span class="material-symbols-rounded text-2xl group-hover:animate-swing origin-top">notifications</span>
                {% if request.session.unread_notifications|default:0 > 0 %}
                <span class="absolute top-1.5 right-1.5 min-w-[1.1rem] h-[1.1rem] rounded-full bg-rose-500 text-white text-[10px] font-bold leading-[1.1rem] text-center px-1">
                    {{ request.session.unread_notifications }}
                </span>
                {% endif %}
            </a>

            <div class="relative" x-data="{ open: false }">
                <button @click="open = !open" @click.outside="open = false" class="flex items-center gap-2 sm:gap-3 focus:outline-none group pl-1 sm:pl-2">
                    <div class="relative">
                        <div class="absolute -inset-0.5 bg-gradient-to-tr from-indigo-500 to-purple-500 rounded-full opacity-0 group-hover:opacity-100 transition-opacity duration-300 blur-[2px]"></div>
                        <img src="https://ui-avatars.com/api/?name={{ request.session.fname }}&background=6366f1&color=fff" 
                             alt="Avatar" 
                             class="relative h-9 w-9 rounded-full ring-2 ring-white shadow-sm object-cover transition-transform duration-300 group-hover:scale-105">
                        <div class="absolute bottom-0 right-0 h-2.5 w-2.5 bg-emerald-500 border-2 border-white rounded-full"></div>
                    </div>

                    <div class="hidden md:block text-left">
                        <p class="text-sm font-bold text-slate-700 group-hover:text-indigo-600 transition-colors">
                            {{ request.session.fname|default:"User"|title }}
                        </p>
                        <p class="text-[10px] text-slate-500 font-medium uppercase tracking-wider">
                            {{ request.session.utype|default:"User" }}
                        </p>
                    </div>
                    <span class="material-symbols-rounded text-slate-400 group-hover:text-indigo-600 transition-transform duration-300" :class="open ? 'rotate-180' : ''">expand_more</span>
                </button>

                <div x-show="open" 
                     style="display: none;" 
                     class="absolute right-0 mt-3 w-56 bg-white/95 backdrop-blur-xl rounded-2xl shadow-2xl border border-white/50 py-2 z-50">
                    
                    <div class="px-4 py-3 border-b border-slate-100 mb-1">
                        <p class="text-xs text-slate-400 uppercase font-bold tracking-wider">Account</p>
                        <p class="text-sm font-medium text-slate-800 truncate">
                            {{ request.session.user_email|default:request.session.user }}
                        </p>
                    </div>

                    <a href="{% url 'main:profile' %}" class="flex items-center gap-3 px-4 py-2.5 text-sm text-slate-600 hover:bg-indigo-50 hover:text-indigo-600 transition-all mx-2 rounded-xl">
                        <span class="material-symbols-rounded text-lg">person</span>
                        Profile
                    </a>
                    
                    <div class="h-px bg-slate-100 my-2"></div>
                    
                    <a href="{% url 'main:login' %}" class="flex items-center gap-3 px-4 py-2.5 text-sm text-rose-600 hover:bg-rose-50 hover:text-rose-700 transition-all mx-2 rounded-xl">
                        <span class="material-symbols-rounded text-lg">logout</span>
                        Sign Out
                    </a>
                </div>
            </div>
        </div>
    </div>
</header>
