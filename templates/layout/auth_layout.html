{% load static tailwind_tags %}
<!doctype html>
<html lang="en" class="h-full">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FIXORA | {% block title %} {% endblock %}</title>
    <link rel="shortcut icon" href="{% static 'assets/images/Favicon.ico' %}" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    {% tailwind_css %}

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes slideInDown {
            0% { opacity: 0; transform: translateY(-20px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .animate-message {
            animation: slideInDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>

<body class="min-h-screen w-full bg-[#0f172a] overflow-x-hidden font-sans text-gray-100">

    <div class="fixed inset-0 z-0 pointer-events-none">
        <div class="absolute rounded-full blur-[120px] opacity-20 bg-cyan-500 w-96 h-96 -top-20 -left-20 animate-pulse"></div>
        <div class="absolute rounded-full blur-[120px] opacity-20 bg-teal-600 w-96 h-96 top-1/2 right-[-100px] animate-pulse delay-700"></div>
    </div>

    <div class="fixed top-6 left-0 right-0 z-[60] flex flex-col items-center px-4 pointer-events-none">
        <div class="w-full max-w-md space-y-3 pointer-events-auto">
            {% if msg %}
            <div class="animate-message relative w-full overflow-hidden bg-white/90 backdrop-blur-md rounded-2xl shadow-2xl shadow-emerald-500/20 border border-emerald-100">
                <div class="p-4 flex items-center">
                    <div class="flex-shrink-0 p-2 bg-emerald-100 rounded-lg text-emerald-600">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <div class="ml-3 flex-1">
                        <p class="text-sm font-semibold text-gray-900 leading-tight">{{ msg }}</p>
                    </div>
                    <button type="button" class="ml-4 text-gray-400 hover:text-gray-600 transition-colors" data-bs-dismiss="alert">
                        <span class="material-icons text-xl">close</span>
                    </button>
                </div>
            </div>
            {% endif %}

            {% if err %}
            <div class="animate-message relative w-full overflow-hidden bg-white/90 backdrop-blur-md rounded-2xl shadow-2xl shadow-rose-500/20 border border-rose-100">
                <div class="p-4 flex items-center">
                    <div class="flex-shrink-0 p-2 bg-rose-100 rounded-lg text-rose-600">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <div class="ml-3 flex-1">
                        <p class="text-sm font-semibold text-gray-900 leading-tight">{{ err }}</p>
                    </div>
                    <button type="button" class="ml-4 text-gray-400 hover:text-gray-600 transition-colors" data-bs-dismiss="alert">
                        <span class="material-icons text-xl">close</span>
                    </button>
                </div>
            </div>
            {% endif %}
        </div>
    </div>

    <div class="relative z-10 min-h-screen w-full flex flex-col items-center justify-center p-6">
        <main class="w-full max-w-md">
            <div class="bg-gray-900/40 backdrop-blur-2xl border border-white/10 rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.3)] overflow-hidden">
                <div class="p-1"> {% block auth_content %}{% endblock auth_content %}
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Close Alert Logic
            const closeButtons = document.querySelectorAll('[data-bs-dismiss="alert"]');
            closeButtons.forEach(button => {
                button.addEventListener('click', function() {
                    const alertBox = this.closest('.animate-message');
                    if (alertBox) {
                        alertBox.style.transition = "all 0.4s cubic-bezier(0.16, 1, 0.3, 1)";
                        alertBox.style.opacity = "0";
                        alertBox.style.transform = "translateX(20px)";
                        setTimeout(() => { alertBox.remove(); }, 400);
                    }
                });
            });

            // Auto-hide alerts after 5 seconds
            setTimeout(() => {
                document.querySelectorAll('.animate-message').forEach(alert => {
                    alert.querySelector('[data-bs-dismiss="alert"]').click();
                });
            }, 5000);
        });
    </script>
</body>
</html>
